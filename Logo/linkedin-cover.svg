<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 4200 700" width="4200" height="700">
  <defs>
    <!-- Main background gradient -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#061a30"/>
      <stop offset="55%"  stop-color="#0a2540"/>
      <stop offset="100%" stop-color="#0d3a6e"/>
    </linearGradient>

    <!-- Bolt gradient -->
    <linearGradient id="boltGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#00d4ff"/>
      <stop offset="100%" stop-color="#0077b6"/>
    </linearGradient>

    <!-- Icon box gradient -->
    <linearGradient id="iconBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#0d3a6e"/>
      <stop offset="100%" stop-color="#062040"/>
    </linearGradient>

    <!-- Left glow -->
    <radialGradient id="glowLeft" cx="50%" cy="50%" r="50%">
      <stop offset="0%"   stop-color="#00b4d8" stop-opacity="0.22"/>
      <stop offset="100%" stop-color="#0a2540" stop-opacity="0"/>
    </radialGradient>

    <!-- Right glow -->
    <radialGradient id="glowRight" cx="50%" cy="50%" r="50%">
      <stop offset="0%"   stop-color="#00b4d8" stop-opacity="0.13"/>
      <stop offset="100%" stop-color="#0a2540" stop-opacity="0"/>
    </radialGradient>

    <!-- Center glow -->
    <radialGradient id="glowCenter" cx="50%" cy="50%" r="50%">
      <stop offset="0%"   stop-color="#00b4d8" stop-opacity="0.07"/>
      <stop offset="100%" stop-color="#0a2540" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- ── BACKGROUND ── -->
  <rect width="4200" height="700" fill="url(#bgGrad)"/>

  <!-- Diagonal accent bands -->
  <polygon points="0,0 900,0 0,700"    fill="rgba(0,180,216,0.03)"/>
  <polygon points="4200,700 3300,700 4200,0" fill="rgba(0,180,216,0.03)"/>

  <!-- Grid lines — horizontal -->
  <line x1="0" y1="175" x2="4200" y2="175" stroke="rgba(0,180,216,0.05)" stroke-width="1"/>
  <line x1="0" y1="350" x2="4200" y2="350" stroke="rgba(0,180,216,0.05)" stroke-width="1"/>
  <line x1="0" y1="525" x2="4200" y2="525" stroke="rgba(0,180,216,0.05)" stroke-width="1"/>

  <!-- Grid lines — vertical -->
  <line x1="1050" y1="0" x2="1050" y2="700" stroke="rgba(0,180,216,0.04)" stroke-width="1"/>
  <line x1="2100" y1="0" x2="2100" y2="700" stroke="rgba(0,180,216,0.04)" stroke-width="1"/>
  <line x1="3150" y1="0" x2="3150" y2="700" stroke="rgba(0,180,216,0.04)" stroke-width="1"/>

  <!-- Glow blobs -->
  <ellipse cx="420"  cy="350" rx="600" ry="420" fill="url(#glowLeft)"/>
  <ellipse cx="3780" cy="350" rx="700" ry="500" fill="url(#glowRight)"/>
  <ellipse cx="2100" cy="350" rx="900" ry="400" fill="url(#glowCenter)"/>

  <!-- Accent bars -->
  <rect x="0" y="0"   width="4200" height="10" fill="url(#boltGrad)" opacity="0.55"/>
  <rect x="0" y="690" width="4200" height="10" fill="url(#boltGrad)" opacity="0.70"/>

  <!-- ── LOGO MARK ── -->
  <rect x="180" y="162" width="376" height="376" rx="72" fill="url(#iconBg)"/>
  <circle cx="368" cy="350" r="160" fill="rgba(0,180,216,0.10)"/>
  <polygon points="412,196 316,374 390,374 330,524 448,330 374,330 430,196" fill="url(#boltGrad)"/>

  <!-- ── COMPANY NAME ── -->
  <text x="600" y="318"
    font-family="Segoe UI, system-ui, -apple-system, sans-serif"
    font-size="210" font-weight="700"
    fill="#ffffff" letter-spacing="-4">Light<tspan fill="#00b4d8">Ops</tspan></text>

  <line x1="600" y1="388" x2="2340" y2="388" stroke="rgba(255,255,255,0.09)" stroke-width="2"/>

  <text x="604" y="508"
    font-family="Segoe UI, system-ui, -apple-system, sans-serif"
    font-size="62" font-weight="300"
    fill="rgba(255,255,255,0.45)" letter-spacing="26">SOLUTIONS</text>

  <circle cx="1230" cy="490" r="9" fill="#00b4d8" opacity="0.80"/>

  <text x="1260" y="508"
    font-family="Segoe UI, system-ui, -apple-system, sans-serif"
    font-size="54" font-weight="300"
    fill="rgba(0,180,216,0.80)" letter-spacing="3">Salesforce &amp; DevOps Experts</text>

  <!-- ── SERVICE PILLS (right side) ── -->
  <!-- Row 1 -->
  <rect x="2680" y="152" width="370" height="88" rx="44" fill="rgba(0,180,216,0.10)" stroke="rgba(0,180,216,0.40)" stroke-width="2"/>
  <text x="2865" y="207" font-family="Segoe UI, system-ui, sans-serif" font-size="42" font-weight="600" fill="#00b4d8" text-anchor="middle" letter-spacing="1">Salesforce</text>

  <rect x="3086" y="152" width="290" height="88" rx="44" fill="rgba(0,180,216,0.10)" stroke="rgba(0,180,216,0.40)" stroke-width="2"/>
  <text x="3231" y="207" font-family="Segoe UI, system-ui, sans-serif" font-size="42" font-weight="600" fill="#00b4d8" text-anchor="middle" letter-spacing="1">DevOps</text>

  <rect x="3412" y="152" width="250" height="88" rx="44" fill="rgba(0,180,216,0.10)" stroke="rgba(0,180,216,0.40)" stroke-width="2"/>
  <text x="3537" y="207" font-family="Segoe UI, system-ui, sans-serif" font-size="42" font-weight="600" fill="#00b4d8" text-anchor="middle" letter-spacing="1">MLOps</text>

  <!-- Row 2 -->
  <rect x="2680" y="268" width="370" height="88" rx="44" fill="rgba(0,180,216,0.10)" stroke="rgba(0,180,216,0.40)" stroke-width="2"/>
  <text x="2865" y="323" font-family="Segoe UI, system-ui, sans-serif" font-size="42" font-weight="600" fill="#00b4d8" text-anchor="middle" letter-spacing="1">DevSecOps</text>

  <rect x="3086" y="268" width="290" height="88" rx="44" fill="rgba(0,180,216,0.10)" stroke="rgba(0,180,216,0.40)" stroke-width="2"/>
  <text x="3231" y="323" font-family="Segoe UI, system-ui, sans-serif" font-size="42" font-weight="600" fill="#00b4d8" text-anchor="middle" letter-spacing="1">FinOps</text>

  <!-- Tagline -->
  <text x="3100" y="460"
    font-family="Segoe UI, system-ui, -apple-system, sans-serif"
    font-size="46" font-weight="300"
    fill="rgba(255,255,255,0.35)" text-anchor="middle" letter-spacing="8">ILLUMINATE YOUR OPERATIONS</text>

  <!-- Domain -->
  <text x="3980" y="650"
    font-family="Segoe UI, system-ui, -apple-system, sans-serif"
    font-size="38" font-weight="300"
    fill="rgba(0,180,216,0.45)" text-anchor="middle" letter-spacing="3">lightops.in  ·  lightops.tech</text>

  <!-- Location -->
  <text x="220" y="650"
    font-family="Segoe UI, system-ui, -apple-system, sans-serif"
    font-size="38" font-weight="300"
    fill="rgba(255,255,255,0.25)" letter-spacing="2">Pune, India  ·  Est. 2025</text>
</svg>
