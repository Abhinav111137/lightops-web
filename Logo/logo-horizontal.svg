<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 200" width="600" height="200">
  <!-- Background -->
  <rect width="600" height="200" rx="24" fill="#0a2540"/>

  <!-- Bolt icon background glow -->
  <circle cx="80" cy="100" r="65" fill="url(#glowGradH)" opacity="0.2"/>

  <!-- Icon circle bg -->
  <rect x="28" y="28" width="104" height="104" rx="22" fill="url(#iconBg)"/>

  <!-- Lightning bolt -->
  <polygon points="95,48 72,105 90,105 76,152 108,88 90,88 108,48" fill="url(#boltGradH)"/>

  <!-- Company name -->
  <text x="158" y="98" font-family="Segoe UI, system-ui, sans-serif" font-size="52" font-weight="700" fill="#ffffff" letter-spacing="-1">Light<tspan fill="#00b4d8">Ops</tspan></text>

  <!-- Divider line -->
  <line x1="158" y1="115" x2="570" y2="115" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>

  <!-- Tagline -->
  <text x="160" y="148" font-family="Segoe UI, system-ui, sans-serif" font-size="18" font-weight="400" fill="rgba(255,255,255,0.55)" letter-spacing="5">SOLUTIONS</text>

  <!-- Dot separator -->
  <circle cx="310" cy="141" r="2.5" fill="#00b4d8" opacity="0.7"/>

  <!-- Sub tagline -->
  <text x="324" y="148" font-family="Segoe UI, system-ui, sans-serif" font-size="15" font-weight="400" fill="rgba(0,180,216,0.75)" letter-spacing="1">Salesforce &amp; DevOps Experts</text>

  <!-- Gradients -->
  <defs>
    <linearGradient id="boltGradH" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00d4ff"/>
      <stop offset="100%" stop-color="#0077b6"/>
    </linearGradient>
    <linearGradient id="iconBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0d3a6e"/>
      <stop offset="100%" stop-color="#062040"/>
    </linearGradient>
    <radialGradient id="glowGradH" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#00b4d8"/>
      <stop offset="100%" stop-color="#0a2540" stop-opacity="0"/>
    </radialGradient>
  </defs>
</svg>
